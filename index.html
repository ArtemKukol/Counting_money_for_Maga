<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор купюр</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 600px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      margin-bottom: 20px;
      width: 100%;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 120px 90px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      gap: 10px;
    }

    .row:last-child {
      border-bottom: none;
    }

    .nominal {
      font-weight: 600;
    }

    input[type="number"] {
      width: 100px;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid #ddd;
      text-align: center;
      font-size: 16px;
    }

    .total {
      font-weight: 600;
      min-width: 80px;
      text-align: right;
    }

    .summary {
      text-align: center;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .summary .value {
      font-size: 24px;
      font-weight: 600;
      margin: 10px 0;
    }

    .deviation {
      font-weight: 600;
    }

    .green { color: #2ecc71; }
    .red { color: #e74c3c; }

    .input-control {
      width: 50%;
      max-width: 320px;
      margin: 10px auto;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #ddd;
      font-size: 20px;
      font-weight: 600;
      text-align: right;
      letter-spacing: 1px;
      display: block;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #007aff;
      color: white;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

  </style>
</head>
<body>

<div class="app">

  <div class="card">
    <h1>Купюры</h1>
    <div id="list"></div>
  </div>

  <div class="card summary">
    <div>Итого</div>
    <div class="value" id="total">0 ₽</div>

    <input class="input-control" id="control" type="number" min="0" max="999999" step="1" inputmode="numeric" placeholder="ДДС" />

    <div class="deviation" id="deviation">Отклонение: 0 ₽</div>

    <button id="reset">Сброс</button>
  </div>

</div>

<script>
const nominals = [5000,2000,1000,500,200,100,50,10,5,2,1];
const list = document.getElementById('list');
const totalEl = document.getElementById('total');
const controlEl = document.getElementById('control');
const deviationEl = document.getElementById('deviation');

let state = {};

nominals.forEach(n => {
  state[n] = 0;

  const row = document.createElement('div');
  row.className = 'row';

  row.innerHTML = `
    <div class="nominal">${n} ₽</div>
    <input type="number" min="0" value="" data-n="${n}" />
    <div class="total" id="t-${n}">0</div>
  `;

  list.appendChild(row);
});

list.addEventListener('input', e => {
  if (!e.target.matches('input')) return;

  const n = e.target.dataset.n;
  const val = parseInt(e.target.value) || 0;

  state[n] = val;

  document.getElementById(`t-${n}`).textContent = (n * val).toLocaleString('ru-RU');

  update();
});

controlEl.addEventListener('input', update);

function update() {
  let total = 0;

  for (let n in state) {
    total += n * state[n];
  }

  totalEl.textContent = total.toLocaleString('ru-RU') + ' ₽';

  const control = parseInt(controlEl.value) || 0;
  const diff = total - control;

  deviationEl.textContent = 'Отклонение: ' + diff.toLocaleString('ru-RU') + ' ₽';

  deviationEl.classList.remove('green','red');
  deviationEl.classList.add(diff === 0 ? 'green' : 'red');
}

document.getElementById('reset').onclick = () => {
  state = {};
  document.querySelectorAll('input').forEach(i => i.value = '');
  document.querySelectorAll('.total').forEach(t => t.textContent = '0');
  update();
};
</script>

</body>
</html>
