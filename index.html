<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta
			name="viewport"
			content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
		/>
		<link rel="stylesheet" href="./css/style.css" />
		<link rel="stylesheet" href="./css/Norm_block_model.css" />
		<link
			rel="shortcut icon"
			href="https://static.tildacdn.com/tild3937-6162-4130-a262-353239616436/____.ico"
			type="image/x-icon"
		/>
		<title>Калькулятор купюр</title>
	</head>
	<body>
		<div class="container">
			<div class="wrapper">
				<div class="table">
					<table>
						<thead>
							<tr>
								<th>Номинал (руб.)</th>
								<th>Количество</th>
								<th>Сумма</th>
							</tr>
						</thead>
						<tbody id="bill-table">
							<tr>
								<td><input type="number" value="5000" readonly /></td>
								<td><input type="text" class="count" inputmode="numeric" pattern="[0-9]*" value="" /></td>
								<td class="total">0</td>
							</tr> 
							<tr>
								<td><input type="number" value="2000" readonly /></td>
								<td><input type="text" inputmode="numeric" pattern="[0-9]*" class="count" value="" /></td>
								<td class="total">0</td>
							</tr>
							<tr>
								<td><input type="number" value="1000" readonly /></td>
								<td><input type="text" inputmode="numeric" pattern="[0-9]*" class="count" value="" /></td>
								<td class="total">0</td>
							</tr>
							<tr>
								<td><input type="number" value="500" readonly /></td>
								<td><input type="text" inputmode="numeric" pattern="[0-9]*" class="count" value="" /></td>
								<td class="total">0</td>
							</tr>
							<tr>
								<td><input type="number" value="200" readonly /></td>
								<td><input type="text" inputmode="numeric" pattern="[0-9]*" class="count" value="" /></td>
								<td class="total">0</td>
							</tr>
							<tr>
								<td><input type="number" value="100" readonly /></td>
								<td><input type="text" inputmode="numeric" pattern="[0-9]*" class="count" value="" /></td>
								<td class="total">0</td>
							</tr>
							<tr>
								<td><input type="number" value="50" readonly /></td>
								<td><input type="text" inputmode="numeric" pattern="[0-9]*" class="count" value="" /></td>
								<td class="total">0</td>
							</tr>
							<tr>
								<td><input type="number" value="10" readonly /></td>
								<td><input type="text" inputmode="numeric" pattern="[0-9]*" class="count" value="" /></td>
								<td class="total">0</td>
							</tr>
							<tr>
								<td><input type="number" value="5" readonly /></td>
								<td><input type="text" inputmode="numeric" pattern="[0-9]*" class="count" value="" /></td>
								<td class="total">0</td>
							</tr>
							<tr>
								<td><input type="number" value="2" readonly /></td>
								<td><input type="text" inputmode="numeric" pattern="[0-9]*" class="count" value="" /></td>
								<td class="total">0</td>
							</tr>
							<tr>
								<td><input type="number" value="1" readonly /></td>
								<td><input type="text" inputmode="numeric" pattern="[0-9]*" class="count" value="" /></td>
								<td class="total">0</td>
							</tr>
						</tbody>
					</table>
					<div class="summary">
						<p>Общая сумма: <span id="total-sum">0</span> руб.</p>
						<input
							type="text" inputmode="numeric" pattern="[0-9]*"
							class="sum"
							id="control-sum"
							placeholder="Введите ДДС"
						/>
						<p>Отклонение: <span id="deviation">0</span> руб.</p>
					</div>
				</div>
			</div>
		</div>
		<script src="./js/script.js"></script>
	</body>
</html>
